<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BAKAR & CO.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
:root{
  --red:#FE3131;--rd:#c92020;
  --blk:#1a1a1a;--gr:#777;
  --lt:#f6f6f6;--bd:#e8e8e8;--wh:#fff;
}
body{
  background:var(--wh);color:var(--blk);
  font-family:'Poppins',sans-serif;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  max-width:480px;margin:0 auto;
  /* shadow sides on desktop to show it's mobile layout */
  box-shadow: 0 0 60px rgba(0,0,0,0.12);
}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:1000;
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--bd);
}
.ni{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:60px;
}
.nl img{
  height:120px;
  filter:brightness(0) saturate(100%) invert(26%) sepia(95%) saturate(2000%) hue-rotate(340deg) brightness(100%);
}
.nc{
  background:var(--red);color:#fff;
  padding:9px 18px;border-radius:6px;
  font-size:12px;font-weight:600;letter-spacing:.03em;
  text-decoration:none;transition:all .2s;
  white-space:nowrap;
}
.nc:hover{background:var(--rd);}

/* ── HERO ── */
.hero{
  position:relative;
  height:100svh;min-height:580px;
  display:flex;align-items:flex-end;
  overflow:hidden;
}
.hero-img{
  position:absolute;inset:0;
  width:100%;height:100%;object-fit:cover;object-position:center;
  /* reduce opacity so text is readable */
  opacity:0.55;
}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,0.92) 0%,
    rgba(0,0,0,0.65) 45%,
    rgba(0,0,0,0.25) 100%
  );
}
.hero-ct{
  position:relative;z-index:2;
  padding:0 20px 48px;width:100%;
}
.hbadge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(254,49,49,0.2);
  border:1px solid rgba(254,49,49,0.35);
  padding:6px 14px;border-radius:100px;
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.9);margin-bottom:16px;
  opacity:0;animation:up .6s ease .1s forwards;
}
.hbadge::before{content:'📍';font-size:11px;}
.hh1{
  font-size:52px;font-weight:700;line-height:.9;
  color:#fff;letter-spacing:-.02em;margin-bottom:8px;
  opacity:0;animation:up .7s ease .2s forwards;
}
.hh1 span{color:var(--red);}
.htag{
  font-size:12px;color:rgba(255,255,255,.6);
  font-weight:300;letter-spacing:.18em;text-transform:uppercase;
  margin-bottom:18px;
  opacity:0;animation:up .6s ease .35s forwards;
}
.hdesc{
  font-size:14px;color:rgba(255,255,255,.75);
  line-height:1.75;font-weight:300;margin-bottom:28px;
  opacity:0;animation:up .6s ease .45s forwards;
}
.hbtns{
  display:flex;gap:12px;
  opacity:0;animation:up .6s ease .55s forwards;
}
.bp{
  flex:1;background:var(--red);color:#fff;
  padding:14px 0;border-radius:8px;
  font-size:13px;font-weight:600;letter-spacing:.03em;
  text-decoration:none;text-align:center;transition:all .2s;
}
.bp:active{background:var(--rd);transform:scale(.98);}
.bs{
  flex:1;background:rgba(255,255,255,.1);color:#fff;
  padding:14px 0;border-radius:8px;
  font-size:13px;font-weight:500;
  text-decoration:none;text-align:center;transition:all .2s;
  border:1px solid rgba(255,255,255,.25);
}
.bs:active{background:rgba(255,255,255,.18);}
.hstats{
  display:flex;gap:0;
  margin-top:32px;padding-top:24px;
  border-top:1px solid rgba(255,255,255,.12);
  opacity:0;animation:up .7s ease .7s forwards;
}
.hs{flex:1;text-align:center;}
.hs:not(:last-child){border-right:1px solid rgba(255,255,255,.1);}
.hs-n{font-size:22px;font-weight:700;color:var(--red);line-height:1;}
.hs-l{font-size:10px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:.03em;}

/* ── SECTIONS ── */
.sec{padding:52px 20px;border-bottom:1px solid var(--bd);}
.sec-lt{padding:52px 20px;background:var(--lt);border-bottom:1px solid var(--bd);}
.sp{
  display:inline-flex;align-items:center;gap:8px;
  font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--red);margin-bottom:10px;
}
.sp::before{content:'';width:20px;height:2px;background:var(--red);}
.sp.c{display:flex;justify-content:center;}
.sp.c::before{display:none;}
.st{font-size:26px;font-weight:700;line-height:1.2;letter-spacing:-.01em;color:var(--blk);}
.ssub{font-size:13px;color:var(--gr);line-height:1.7;margin-top:8px;font-weight:300;}
.sh{margin-bottom:28px;}
.sh.c{text-align:center;}

/* ── ABOUT ── */
.about-img{
  width:100%;border-radius:12px;
  object-fit:cover;aspect-ratio:16/9;
  display:block;margin-bottom:28px;
}
.abt p{font-size:14px;color:var(--gr);line-height:1.8;margin-bottom:14px;font-weight:300;}
.abt p strong{color:var(--blk);font-weight:600;}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 24px;}
.pill{
  padding:6px 14px;background:var(--wh);border-radius:100px;
  font-size:11px;font-weight:600;color:var(--blk);
  border:1px solid var(--bd);
}

/* ── MENU ── */
.mg{display:flex;flex-direction:column;gap:16px;}
.mc{
  background:var(--wh);border-radius:12px;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.07);
  display:flex;transition:all .3s;
  opacity:0;transform:translateY(16px);
}
.mc.in{opacity:1;transform:translateY(0);transition:opacity .5s ease,transform .5s ease;}
.mc:active{transform:scale(.99);}
.mc-img{width:110px;height:110px;object-fit:cover;flex-shrink:0;}
.mc-bd{
  flex:1;padding:14px 16px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.mc-tag{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--red);margin-bottom:3px;}
.mc-name{font-size:15px;font-weight:700;color:var(--blk);line-height:1.2;margin-bottom:3px;}
.mc-desc{font-size:11px;color:var(--gr);line-height:1.45;}
.mc-ft{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.mc-pr{font-size:16px;font-weight:700;color:var(--blk);}
.mc-btn{
  background:var(--red);color:#fff;
  padding:7px 16px;border-radius:6px;
  font-size:11px;font-weight:600;
  text-decoration:none;transition:all .2s;
}
.mc-btn:active{background:var(--rd);}

/* ── ORDER ── */
.stps{display:flex;flex-direction:column;gap:0;margin-bottom:32px;}
.si-step{
  display:flex;gap:18px;align-items:flex-start;
  padding:20px 0;border-bottom:1px solid var(--bd);
  opacity:0;transform:translateX(-16px);
}
.si-step:first-child{border-top:1px solid var(--bd);}
.si-step.in{opacity:1;transform:translateX(0);transition:all .45s ease;}
.sn{
  width:40px;height:40px;border-radius:50%;
  background:var(--red);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0;
  box-shadow:0 4px 12px rgba(254,49,49,.3);
}
.stitle{font-size:14px;font-weight:600;color:var(--blk);margin-bottom:3px;}
.sdesc{font-size:12px;color:var(--gr);line-height:1.55;}
.cta-box{
  background:linear-gradient(135deg,#1a0505,#2d0f0f);
  border-radius:16px;padding:32px 24px;
  position:relative;overflow:hidden;
}
.cta-box::before{
  content:'';position:absolute;top:-40%;right:-20%;
  width:250px;height:250px;border-radius:50%;
  background:radial-gradient(circle,rgba(254,49,49,.2) 0%,transparent 70%);
}
.cb-lbl{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:10px;}
.cb-title{font-size:28px;font-weight:700;color:#fff;line-height:1.1;letter-spacing:-.01em;margin-bottom:8px;}
.cb-title span{color:var(--red);}
.cb-sub{font-size:13px;color:rgba(255,255,255,.5);line-height:1.65;margin-bottom:24px;font-weight:300;}
.btn-wa{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:#fff;color:var(--blk);
  padding:14px;border-radius:8px;
  font-size:14px;font-weight:700;text-decoration:none;
  position:relative;z-index:1;transition:all .2s;
}
.btn-wa:active{background:var(--red);color:#fff;}

/* ── INFO ── */
.ig{display:flex;flex-direction:column;gap:14px;}
.ic{
  background:var(--wh);border-radius:12px;
  border:1px solid var(--bd);padding:24px 20px;
  display:flex;gap:16px;align-items:flex-start;
  opacity:0;transform:translateY(12px);
}
.ic.in{opacity:1;transform:translateY(0);transition:opacity .45s,transform .45s;}
.ic-ico{
  width:44px;height:44px;border-radius:10px;
  background:rgba(254,49,49,.08);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.ic-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:4px;}
.ic-title{font-size:15px;font-weight:700;color:var(--blk);margin-bottom:6px;}
.ic-body{font-size:12px;color:var(--gr);line-height:1.75;}
.ic-body strong{color:var(--blk);font-weight:600;}

/* ── CTA STRIP ── */
.ctas{
  background:var(--red);padding:48px 20px;text-align:center;
  position:relative;overflow:hidden;
}
.ctas::before{
  content:'';position:absolute;top:-40%;left:50%;transform:translateX(-50%);
  width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.05);
}
.cts-t{font-size:28px;font-weight:700;color:#fff;letter-spacing:-.01em;margin-bottom:10px;line-height:1.2;}
.cts-s{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:28px;font-weight:300;line-height:1.65;}
.bwh{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:#fff;color:var(--red);
  padding:15px 24px;border-radius:8px;
  font-size:14px;font-weight:700;text-decoration:none;
  transition:all .2s;
}
.bwh:active{background:var(--blk);color:#fff;}

/* ── FOOTER ── */
footer{background:#111;padding:40px 20px 32px;}
.fli{height:30px;filter:brightness(0) invert(1);display:block;margin-bottom:12px;}
.fab{font-size:12px;line-height:1.7;color:rgba(255,255,255,.4);margin-bottom:28px;}
.fct{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:12px;}
.fls{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.fls a{font-size:13px;color:rgba(255,255,255,.5);text-decoration:none;}
.fcp{font-size:13px;line-height:1.8;color:rgba(255,255,255,.45);margin-bottom:28px;}
.fcp strong{color:#fff;font-weight:600;}
.fbc{font-size:11px;color:rgba(255,255,255,.2);border-top:1px solid rgba(255,255,255,.06);padding-top:20px;}

/* ── ANIM ── */
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Desktop — keep center aligned */
@media(min-width:481px){
  body{background:#f0f0f0;}
}
</style>
